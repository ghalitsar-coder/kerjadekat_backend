# Baris 'version' sudah dihapus agar tidak muncul warning "obsolete" lagi

services:
  backend:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: kerjadekat_backend
    ports:
      - "8080:8080"
    # 1. Baca SEMUA konfigurasi dari file .env (JWT, OAuth, Xendit, dll)
    env_file:
      - .env
    # 2. Timpa (override) HANYA untuk koneksi antar-container
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432 # Gunakan port default internal postgres, bukan 54325
      - REDIS_HOST=redis
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - kerjadekat_network
  postgres:
    image: postgis/postgis:17-3.5
    container_name: kerjadekat_postgres
    environment:
      POSTGRES_USER: kerjadekat_admin
      POSTGRES_PASSWORD: SuperSecurePassword123!
      POSTGRES_DB: kerjadekat_db
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kerjadekat_admin -d kerjadekat_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kerjadekat_network

  redis:
    image: redis:7-alpine
    container_name: kerjadekat_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kerjadekat_network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: kerjadekat_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    entrypoint: >
      sh -c "
      if [ ! -f /plugins/rabbitmq_delayed_message_exchange-3.13.0.ez ]; then
        wget -P /plugins https://github.com/rabbitmq/rabbitmq-delayed-message-exchange/releases/download/v3.13.0/rabbitmq_delayed_message_exchange-3.13.0.ez;
      fi &&
      rabbitmq-plugins enable rabbitmq_delayed_message_exchange &&
      exec docker-entrypoint.sh rabbitmq-server
      "
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - kerjadekat_network

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  kerjadekat_network:
    driver: bridge