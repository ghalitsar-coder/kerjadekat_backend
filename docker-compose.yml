version: '3.8'

services:
  postgres:
    image: postgis/postgis:17-3.5
    container_name: kerjadekat_postgres
    environment:
      POSTGRES_USER: kerjadekat_admin
      POSTGRES_PASSWORD: SuperSecurePassword123!
      POSTGRES_DB: kerjadekat_db
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kerjadekat_admin -d kerjadekat_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kerjadekat_network

  redis:
    image: redis:7-alpine
    container_name: kerjadekat_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kerjadekat_network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: kerjadekat_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    entrypoint: >
      sh -c "
      wget -P /plugins https://github.com/rabbitmq/rabbitmq-delayed-message-exchange/releases/download/v3.13.0/rabbitmq_delayed_message_exchange-3.13.0.ez &&
      rabbitmq-plugins enable rabbitmq_delayed_message_exchange &&
      exec docker-entrypoint.sh rabbitmq-server
      "
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - kerjadekat_network

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  kerjadekat_network:
    driver: bridge
